<!DOCTYPE html>
<html>
  <head>
    <title>book.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div id="leftHeader">
        <a href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='images/misc/super_cool_logo.png') }}" 
          alt="Treble Clef logo"
          style="height:150px;">
        </a>
      </div>

      <div id="midHeader">
        <form id="searchBoxForm" action="{{ url_for('search') }}" method="post">
          <input id="searchBox" type="text" placeholder="Book Title Search" name="search">
          <input id="searchIcon" type="image" src="{{ url_for('static', filename='images/misc/search-icon.png') }}" alt="search icon">
        </form>

        <div class="dropdown">
          <p class="dropdownSelect">Select Category</p>
          <div class="dropdownContent">
            {% for category in categories %}
              <p>
                <a href="{{ url_for('category', categoryId=category.categoryId) }}">
                  {{ category.categoryName }}
                </a>
              </p>
            {% endfor %}
          </div>
        </div>
      <div class="featuredButton">
        <a href="{{ url_for('read') }}">Browse all</a>
      </div>

      <div class="featuredButton">
        <a href="{{ url_for('add_book_form') }}">Create Book</a>
        </div>
      </div>

      <div id="rightHeader">
        <div id="cartIcon">
          <a href="#">
            <img src="{{ url_for('static', filename='images/misc/cart-icon.jpg') }}" alt="shopping cart icon">
          </a>
        </div>
        <div id="cartCount">1 item</div>
        <div class="loginButton"><a href="#">login</a></div>
         

      </div>

     
    </header>

    <main>{% block container %}{% endblock %}</main>

    <footer>
      <div id="footerLeft">
        <p>book.</p>
        <p>&copy;</p>
        <a href="#">Contact Us</a>
        <a href="#">Directions</a>
      </div>
      <div id="footerRight">
        <a href="#"><img src="{{ url_for('static', filename='images/misc/facebook-icon.jpg') }}" alt="Facebook"></a>
        <a href="#"><img src="{{ url_for('static', filename='images/misc/twitter-icon.jpg') }}" alt="Twitter"></a>
      </div>
    </footer>
  </body>
</html>
